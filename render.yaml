# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: svinolink-bot
    runtime: docker
    plan: free
    autoDeploy: true
    branch: master
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: WEBHOOK_PATH
        value: webhook
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: INSTAGRAM_PAUSED
        value: "0"
      - key: INSTAGRAM_COOKIES_FILE
        value: /app/data/cookies.txt
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: INSTAGRAM_PASSWORD
        sync: false
      - key: AI_ENABLED
        value: "0"
      - key: WEB_SEARCH_ENABLED
        value: "0"
      - key: GAMES_ENABLED
        value: "0"
      - key: MEMORY_ENABLED
        value: "0"
      - key: SKILLS_TOOLS_ENABLED
        value: "0"
      - key: DOWNLOADS_DIR
        value: /app/downloads
      - key: PORT
        value: "8080"
