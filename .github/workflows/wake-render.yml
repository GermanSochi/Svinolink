name: Wake Render

on:
  schedule:
    # Times are UTC. MSK (UTC+3): 07:00, 12:00, 15:00, 18:00, 00:00
    # UTC: 04:00, 09:00, 12:00, 15:00, 21:00
    - cron: "0 4 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch: {}

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Wake via /health
        run: |
          set -euo pipefail
          URL="https://svinolink.onrender.com/health"
          echo "Pinging $URL"
          # Retry a bit to handle cold-start delays
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 25 "$URL" >/dev/null; then
              echo "OK"
              exit 0
            fi
            echo "Retry $i/5"
            sleep 10
          done
          echo "Wake failed"
          exit 1

