name: Keep Render Alive

on:
  schedule:
    # Каждые 5 минут — Render free tier спит через 15 мин без запросов
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          set -euo pipefail
          URL="https://svinolink.onrender.com/health"
          echo "$(date -u): Pinging $URL"
          for i in 1 2 3; do
            if curl -fsS --max-time 20 "$URL" >/dev/null 2>&1; then
              echo "OK (attempt $i)"
              exit 0
            fi
            echo "Retry $i/3"
            sleep 8
          done
          echo "FAILED — Render may be down"
          exit 1
